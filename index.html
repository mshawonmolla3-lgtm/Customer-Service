<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada Shopping</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f4; color: #333; }
        
        /* Header */
        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 2px solid #f57224; }
        .header img { height: 30px; }

        /* Login Page Styling */
        #login-page { padding: 40px 20px; text-align: center; display: block; }
        .login-box { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: #f57224; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Dashboard Styling (Initially Hidden) */
        #dashboard { display: none; padding: 20px; }
        .profile-section { background: linear-gradient(90deg, #f57224, #ff9d5c); padding: 25px; border-radius: 15px; color: #fff; margin-bottom: 20px; }
        .balance { font-size: 32px; font-weight: bold; margin: 10px 0; }
        
        .card { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card p { display: flex; justify-content: space-between; padding: 5px 0; }

        /* Bottom Navbar (Initially Hidden) */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #fff; display: none; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
        .navbar i { font-size: 20px; color: #666; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Lazada_Logo.svg/1200px-Lazada_Logo.svg.png" alt="Lazada">
    </div>

    <div id="login-page">
        <div class="login-box">
            <h3 style="color:#f57224; margin-bottom:15px;">Sign In</h3>
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-main" onclick="checkLogin()">Login</button>
            <p id="error" style="color:red; font-size:12px; margin-top:10px; display:none;">Wrong Phone or Password!</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="profile-section">
            <p>Total Balance</p>
            <div class="balance">$3,462.18</div>
            <p>Today's Commission: $0.00</p>
        </div>

        <div class="card">
            <p><span>****7782</span> <span style="color:#f57224;">$7,410.87</span></p>
            <p><span>****6591</span> <span style="color:#f57224;">$9,993.57</span></p>
        </div>
    </div>

    <div class="navbar" id="nav">
        <i class="fa fa-home"></i>
        <i class="fa fa-list"></i>
        <i class="fa fa-user"></i>
    </div>

    <script>
        function checkLogin() {
            var phone = document.getElementById("phone").value;
            var pass = document.getElementById("pass").value;
            var errorMsg = document.getElementById("error");

            // এখানে আপনার পাসওয়ার্ড সেট করুন (যেমন: 123456)
            if (phone === "0582745513" && pass === "123456") {
                document.getElementById("login-page").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                document.getElementById("nav").style.display = "flex";
            } else {
                errorMsg.style.display = "block";
            }
        }
    </script>

</body>
</html>
