<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada Dashboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { padding: 40px 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }
        .balance { font-size: 40px; color: #f5b301; font-weight: bold; margin: 15px 0; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 25px; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 120px; }
        .recharge { background: #f57224; color: #fff; }
        .withdraw { background: #333; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lazada Dashboard</h2>
        <div class="card">
            <p>Total Balance</p>
            <div class="balance">$3,462.18</div>
        </div>
        <div class="btn-group">
            <button class="btn recharge">Recharge</button>
            <button class="btn withdraw">Withdraw</button>
        </div>
    </div>
</body>
</html>
