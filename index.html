<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada Shopping</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f4; color: #333; }
        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 2px solid #f57224; }
        .header img { width: 120px; }
        
        /* Login Page */
        #login-page { padding: 40px 20px; text-align: center; }
        .login-box { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: #f57224; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Dashboard */
        #dashboard { display: none; padding: 15px; }
        .profile-section { background: linear-gradient(90deg, #f57224, #ff9d5c); padding: 25px; border-radius: 15px; color: #fff; margin-bottom: 20px; }
        .balance-label { font-size: 14px; opacity: 0.9; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 10px 0; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .action-card { background: #fff; padding: 15px; border-radius: 10px; text-align: center; font-size: 12px; font-weight: bold; }
        .action-card i { font-size: 24px; color: #f57224; margin-bottom: 8px; display: block; }

        .commission-list { background: #fff; border-radius: 10px; padding: 15px; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .commission-amt { color: #f57224; font-weight: bold; }

        /* Navigation */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 20px; color: #999; cursor: pointer; }
        .nav-item.active { color: #f57224; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Lazada_Logo.svg/1200px-Lazada_Logo.svg.png" alt="Lazada">
    </div>

    <div id="login-page">
        <div class="login-box">
            <h3 style="margin-bottom: 20px; color: #f57224;">Login</h3>
            <input type="text" placeholder="Phone Number / Email" value="0582745513">
            <input type="password" placeholder="Password" value="******">
            <button class="btn-main" onclick="showDashboard()">Sign in</button>
            <p style="margin-top: 15px; font-size: 12px; color: #999;">Register account | Service</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="profile-section">
            <p class="balance-label">Hi, JMP_h0xwk8</p>
            <p class="balance-label">Account balance</p>
            <div class="balance-amount">$3,462.18</div>
            <p style="font-size: 12px;">Today's commission: $0.00</p>
        </div>

        <div class="action-btns">
            <div class="action-card"><i class="fa-solid fa-circle-dollar-to-slot"></i>Recharge</div>
            <div class="action-card"><i class="fa-solid fa-money-bill-transfer"></i>Withdraw</div>
            <div class="action-card"><i class="fa-solid fa-share-nodes"></i>Invite</div>
        </div>

        <div class="commission-list">
            <h4 style="margin-bottom: 10px;">Recent Commissions</h4>
            <div class="list-item"><span>****7782</span> <span class="commission-amt">$7,410.87</span></div>
            <div class="list-item"><span>****6591</span> <span class="commission-amt">$9,993.57</span></div>
            <div class="list-item"><span>****7370</span> <span class="commission-amt">$5,369.60</span></div>
            <div class="list-item"><span>****6625</span> <span class="commission-amt">$6,428.97</span></div>
        </div>
    </div>

    <div class="navbar" id="main-nav" style="display: none;">
        <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i></div>
        <div class="nav-item"><i class="fa-solid fa-bag-shopping"></i></div>
        <div class="nav-item"><i class="fa-solid fa-comment-dots"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i></div>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
        }
    </script>
</body>
</html>
